# baseline-dark.toml (Refined)
# A minimalist dark theme for Helix that prioritizes readability through restrained
# use of color. Built on Material Design 3 principles with muted tones to reduce
# visual fatigue during extended editing sessions.
#
# COLOR SEMANTICS:
# • Green: Constants, strings, literals, additions (immutable data)
# • Blue: Functions, methods, tags, headings, links (callable/navigable)
# • Orange: Function parameters (inputs/configuration)
# • Cyan: Types, namespaces, attributes, special strings (structure/architecture)
# • Magenta: Macros, special operations (meta-programming)
# • Red: Errors, deletions (danger/attention)
# • Yellow: Warnings, modifications (caution)
# • Gray tones: Variables, keywords, operators, punctuation, comments (default code)

# DIAGNOSTICS ==============================

warning = { fg = "yellow" }
error = { fg = "red" }
info = { fg = "blue" }
hint = { fg = "magenta" }

"diagnostic" = { underline = { style = "curl" } }
"diagnostic.hint" = { underline = { color = "magenta", style = "dotted" } }
"diagnostic.info" = { underline = { color = "blue", style = "curl" } }
"diagnostic.warning" = { underline = { color = "yellow", style = "curl" } }
"diagnostic.error" = { underline = { color = "red", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# UI ==============================

"ui.background" = { bg = "surface" }
"ui.window" = { fg = "surfaceContainerHighest" }

"ui.gutter" = { bg = "surface" }
"ui.gutter.selected" = { bg = "surfaceContainer" }

"ui.text" = { fg = "onSurfaceVariant" }
"ui.text.focus" = { fg = "onPrimary", bg = "primary" }
"ui.text.inactive" = { fg = "outline" }
"ui.text.info" = { fg = "onSecondaryContainer" }

"ui.cursor" = { modifiers = ["reversed"] }
"ui.cursor.match" = { bg = "primaryContainer", fg = "onPrimaryContainer" }

"ui.selection" = { bg = "primaryContainer" }
"ui.selection.primary" = { bg = "primaryContainer" }

"ui.linenr" = { fg = "outlineVariant", bg = "surface" }
"ui.linenr.selected" = { fg = "primary", modifiers = ["bold"] }

"ui.statusline" = { fg = "onSurface", bg = "surfaceContainer" }
"ui.statusline.inactive" = { fg = "outline", bg = "surfaceContainerLow" }
"ui.statusline.normal" = { fg = "onPrimaryContainer", bg = "primaryContainer" }
"ui.statusline.insert" = { fg = "onSecondaryContainer", bg = "secondaryContainer" }
"ui.statusline.select" = { fg = "onTertiaryContainer", bg = "tertiaryContainer" }
"ui.statusline.separator" = { fg = "outline" }

"ui.bufferline" = { fg = "outline", bg = "surfaceContainer" }
"ui.bufferline.active" = { fg = "onSurface", bg = "surfaceContainerHighest", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "surface" }

"ui.menu" = { fg = "onSurface", bg = "surfaceContainerHigh" }
"ui.menu.selected" = { fg = "inverseOnSurface", bg = "inverseSurface" }
"ui.menu.scroll" = { fg = "primary", bg = "surfaceContainer" }

"ui.popup" = { fg = "onSurface", bg = "surfaceContainerHigh" }
"ui.popup.info" = { fg = "onSurface", bg = "surfaceContainer" }

"ui.picker.header" = { fg = "onSurface", bg = "surfaceContainer" }
"ui.picker.header.column" = { fg = "outline" }
"ui.picker.header.column.active" = { fg = "onSurface", bg = "surfaceContainerHighest" }

"ui.help" = { fg = "onSurfaceVariant", bg = "surfaceContainerHigh" }

"ui.highlight" = { bg = "secondaryContainer" }
"ui.highlight.frameline" = { bg = "tertiaryContainer" }

"ui.cursorline.primary" = { bg = "surfaceContainer" }
"ui.cursorline.secondary" = { bg = "surfaceContainerLow" }

"ui.cursorcolumn.primary" = { bg = "surfaceContainer" }
"ui.cursorcolumn.secondary" = { bg = "surfaceContainerLow" }

"ui.virtual.ruler" = { bg = "surfaceContainerLow" }
"ui.virtual.whitespace" = { fg = "surfaceContainerHighest" }
"ui.virtual.indent-guide" = { fg = "surfaceContainerHighest" }
"ui.virtual.inlay-hint" = { fg = "outline", modifiers = ["italic"] }
"ui.virtual.inlay-hint.parameter" = { fg = "outline", modifiers = ["italic"] }
"ui.virtual.inlay-hint.type" = { fg = "outline", modifiers = ["italic"] }
"ui.virtual.wrap" = { fg = "outline" }
"ui.virtual.jump-label" = { fg = "onError", bg = "error", modifiers = ["bold"] }

"ui.debug.breakpoint" = { fg = "red" }
"ui.debug.active" = { fg = "onError", bg = "error" }

# SYNTAX HIGHLIGHTING ==============================
# Minimal highlighting philosophy:
# - Comments: dimmer, italic
# - Constants & strings: green
# - Functions: blue
# - Parameters: orange
# - Keywords & operators: subtle (outline color)
# - Everything else: default foreground

"comment" = { fg = "neutral40", modifiers = ["italic"] }
"comment.line" = { fg = "neutral40", modifiers = ["italic"] }
"comment.line.documentation" = { fg = "neutral50", modifiers = ["italic"] }
"comment.block" = { fg = "neutral50", modifiers = ["italic"] }
"comment.block.documentation" = { fg = "neutral60", modifiers = ["italic"] }

"constant" = { fg = "green" }
"constant.builtin" = { fg = "green" }
"constant.builtin.boolean" = { fg = "green" }
"constant.numeric" = { fg = "green" }

"string" = { fg = "green" }
"string.special" = { fg = "cyan" }
"string.special.symbol" = { fg = "cyan" }

"variable" = { fg = "onSurfaceVariant" }
"variable.builtin" = { fg = "blue", modifiers = ["bold"] }
"variable.parameter" = { fg = "orange" }
"variable.other.member" = { fg = "onSurfaceVariant" }

"label" = { fg = "onSurfaceVariant" }

"punctuation" = { fg = "outline" }
"punctuation.bracket" = { fg = "onSurfaceVariant" }
"punctuation.special" = { fg = "cyan" }

"keyword" = { fg = "onSurfaceVariant" }
"keyword.control.return" = { fg = "onSurfaceVariant" }
"keyword.control.exception" = { fg = "onSurfaceVariant" }
"keyword.function" = { fg = "onSurfaceVariant" }

"operator" = { fg = "onSurfaceVariant" }

"function" = { fg = "blue" }
"function.builtin" = { fg = "blue", modifiers = ["dim"] }
"function.method" = { fg = "blue" }
"function.macro" = { fg = "magenta" }

"type" = { fg = "cyan" }
"type.builtin" = { fg = "cyan", modifiers = ["bold"] }

"tag" = { fg = "blue" }
"tag.builtin" = { fg = "blue", modifiers = ["bold"] }

"namespace" = { fg = "cyan" }
"attribute" = { fg = "cyan" }
"constructor" = { fg = "blue" }
"special" = { fg = "magenta" }

# MARKUP ==============================

"markup.heading.marker" = { fg = "primary", modifiers = ["bold"] }
"markup.heading.1" = { fg = "primary", modifiers = ["bold"] }
"markup.heading.2" = { fg = "primary", modifiers = ["bold"] }
"markup.heading.3" = { fg = "blue", modifiers = ["bold"] }
"markup.heading.4" = { fg = "blue", modifiers = ["bold"] }
"markup.heading.5" = { fg = "cyan", modifiers = ["bold"] }
"markup.heading.6" = { fg = "cyan", modifiers = ["bold"] }

"markup.list.numbered" = { fg = "blue" }
"markup.list.unnumbered" = { fg = "blue" }
"markup.list.checked" = { fg = "green" }
"markup.list.unchecked" = { fg = "outline" }

"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }

"markup.link" = { fg = "blue" }
"markup.link.url" = { fg = "blue", underline = { style = "line" } }
"markup.link.text" = { fg = "yellow" }

"markup.quote" = { fg = "neutral50", modifiers = ["italic"] }

"markup.raw" = { fg = "neutral60" }
"markup.raw.inline" = { fg = "neutral60" }
"markup.raw.block" = { fg = "neutral60", bg = "surfaceContainerLow" }

# DIFF ==============================

"diff.plus" = { fg = "green" }
"diff.plus.gutter" = { fg = "green" }

"diff.minus" = { fg = "red" }
"diff.minus.gutter" = { fg = "red" }

"diff.delta" = { fg = "yellow" }
"diff.delta.moved" = { fg = "yellow" }
"diff.delta.gutter" = { fg = "yellow" }

"tabstop" = { bg = "primaryContainer", fg = "onPrimaryContainer" }

